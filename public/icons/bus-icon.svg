<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Bus body -->
  <rect x="126" y="120" width="260" height="240" rx="40" fill="#fff"/>
  <!-- Roof -->
  <rect x="156" y="104" width="200" height="36" rx="18" fill="#fff"/>
  <!-- Windshield -->
  <rect x="152" y="148" width="208" height="80" rx="18" fill="#0a0e1a"/>
  <!-- Windshield divider -->
  <rect x="254" y="148" width="4" height="80" fill="#334155"/>
  <!-- Side windows row -->
  <rect x="152" y="250" width="56" height="44" rx="10" fill="#0a0e1a"/>
  <rect x="228" y="250" width="56" height="44" rx="10" fill="#0a0e1a"/>
  <rect x="304" y="250" width="56" height="44" rx="10" fill="#0a0e1a"/>
  <!-- Bumper -->
  <rect x="146" y="340" width="220" height="20" rx="10" fill="#e2e8f0"/>
  <!-- Wheels -->
  <circle cx="192" cy="370" r="30" fill="#1e293b"/>
  <circle cx="192" cy="370" r="16" fill="#475569"/>
  <circle cx="192" cy="370" r="6" fill="#94a3b8"/>
  <circle cx="320" cy="370" r="30" fill="#1e293b"/>
  <circle cx="320" cy="370" r="16" fill="#475569"/>
  <circle cx="320" cy="370" r="6" fill="#94a3b8"/>
  <!-- Headlights -->
  <circle cx="156" cy="320" r="14" fill="#fbbf24"/>
  <circle cx="156" cy="320" r="8" fill="#fff"/>
  <circle cx="356" cy="320" r="14" fill="#fbbf24"/>
  <circle cx="356" cy="320" r="8" fill="#fff"/>
</svg>
